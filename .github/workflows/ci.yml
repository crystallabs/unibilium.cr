name: Linux CI

on:
  push:
  pull_request:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Download source
        uses: actions/checkout@v4
      - name: Install Crystal
        uses: oprypin/install-crystal@v2
      - name: Cache shards
        uses: actions/cache@v4
        with:
          path: ~/.cache/shards
          key: ${{ runner.os }}-shards-${{ hashFiles('shard.yml') }}
          restore-keys: ${{ runner.os }}-shards-
      - name: Install packages
        run: sudo apt-get install libunibilium-dev libunibilium4
      - name: Install shards
        run: shards update
      - name: Run tests
        run: crystal spec --order=random --error-on-warnings
      - name: Check formatting
        run: crystal tool format --check
  release_linux:
    runs-on: ubuntu-latest
    container:
      image: crystallang/crystal:latest-alpine
    steps:
      - name: Download source
        uses: actions/checkout@v4
      - name: Install packages
        run: apk add unibilium unibilium-dev
      - name: Build binaries
        run: |
          shards update --production --release --static --no-debug
          crystal build --time --release --static --no-debug -o examples/main examples/main.cr
